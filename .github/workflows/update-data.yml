name: Update Data

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6:00 UTC (12:00 Astana)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update exchange rates
        run: node scripts/update-rates.js

      - name: Validate data
        run: node scripts/validate-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "Quralhub Bot"
          git config user.email "bot@quralhub.kz"
          git add public/data.json
          git diff --cached --quiet || git commit -m "chore: update exchange rates $(date +%Y-%m-%d)"
          git push
