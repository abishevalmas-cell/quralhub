name: Monthly Data Check & Reminder

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of every month at 08:00 UTC (14:00 Astana)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check MRP/MZP
        run: node scripts/update-mrp.js
        continue-on-error: true

      - name: Check bank pages
        run: node scripts/update-banks.js
        continue-on-error: true

      - name: Check telecom pages
        run: node scripts/update-telecom.js
        continue-on-error: true

      - name: Create monthly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 Ежемесячное обновление данных — ${date}`,
              body: `## Автоматическая проверка Quralhub

            Скрипты проверки запущены. Проверьте логи Actions.

            ### Проверить вручную:
            - [ ] **Банки** — ставки депозитов/кредитов (lib/data/banks.ts)
            - [ ] **Ипотека** — условия программ (lib/data/mortgage.ts)
            - [ ] **Телеком** — тарифы операторов (lib/data/telecom.ts)
            - [ ] **ISP** — тарифы провайдеров (lib/data/isp.ts)

            ### Автоматически (каждые 2 часа):
            - ✅ Курсы валют НБ РК
            - ✅ Обменники 14 городов

            ---
            🤖 Quralhub Bot`,
              labels: ['data-update']
            });
